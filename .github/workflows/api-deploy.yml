name: Backend Deploy

on:
  push:
    branches:
      - main
      - hml

jobs:
  deploy:
    name: Build and Deploy API
    runs-on: self-hosted

    steps:
      - name: Checkout API Code
        uses: actions/checkout@v4
        with:
          # Evita conflitos de permissão se o runner criou algo como root antes
          clean: false

      - name: Build and Restart API Container
        run: |
          docker compose \
            --env-file /home/guiassys/devtools/repos/aura-infra/docker/hml/.env \
            -f /home/guiassys/devtools/repos/aura-infra/docker/hml/docker-compose.yml \
            --project-directory . \
            up -d --build auraskill-api

      - name: Clean up old images
        run: docker image prune -f