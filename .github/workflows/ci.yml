name: Backend Deploy

on:
  push:
    branches:
      - hml
      - prd
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (dev, hml, prd)'
        required: true
        default: 'hml'
        type: choice
        options:
          - dev
          - hml
          - prd

# Evita que execuções simultâneas no mesmo ambiente causem conflitos de arquivos no servidor
concurrency:
  group: deploy-${{ github.ref_name }}-${{ github.event.inputs.environment || 'push' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and Deploy API
    runs-on: self-hosted

    steps:
      # Passo 0: Determinar o ambiente dinamicamente (dev, hml, prd)
      - name: Determine Environment
        id: set_environment
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ENVIRONMENT=${{ github.event.inputs.environment }}" >> "$GITHUB_ENV"
          else
            case "${{ github.ref_name }}" in
              "hml") echo "ENVIRONMENT=hml" >> "$GITHUB_ENV" ;;
              "prd") echo "ENVIRONMENT=prd" >> "$GITHUB_ENV" ;;
              *)     echo "ENVIRONMENT=hml" >> "$GITHUB_ENV" ;;
            esac
          fi

      # Passo 1: Baixa o código fonte da branch que disparou o evento (Garante a criação do workspace)
      - name: Checkout API Code
        uses: actions/checkout@v4

      # Auxiliar: Define os caminhos da infraestrutura de forma 100% dinâmica (Agora com workspace ativo)
      - name: Set Infra Paths
        run: |
          # Sobe 3 níveis a partir de _work/aura-api/aura-api/ e aponta para a infra
          INFRA_BASE="${{ github.workspace }}/../../../aura-infra/aura-infra/docker"
          
          echo "INFRA_ENV_DIR=$INFRA_BASE/${{ env.ENVIRONMENT }}" >> "$GITHUB_ENV"
          echo "INFRA_COMMON_DIR=$INFRA_BASE/common" >> "$GITHUB_ENV"

      # Configurar o ambiente Java 21 com cache do Maven ativo
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # Executar Testes Automatizados via Maven
      - name: Run Automated Tests
        run: mvn clean test

      # Descobrir a porta/IP do Sonar do ambiente e executar a Análise de Código Estático
      - name: Run SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          # Extrai os valores removendo quebras de linha e espaços
          SONAR_PORT=$(grep -E '^SONAR_PORT=' "${{ env.INFRA_ENV_DIR }}/.env" | cut -d'=' -f2 | tr -d '\r\n' | xargs)
          SONAR_HOST_IP=$(grep -E '^AURASKILL_HOST_IP=' "${{ env.INFRA_ENV_DIR }}/.env" | cut -d'=' -f2 | tr -d '\r\n' | xargs)
          
          echo "Enviando análise para o SonarQube em http://$SONAR_HOST_IP:$SONAR_PORT"
          
          mvn sonar:sonar \
            -Dsonar.host.url="http://$SONAR_HOST_IP:$SONAR_PORT" \
            -Dsonar.token=$SONAR_TOKEN \
            -Dsonar.projectKey=auraskill-api-${{ env.ENVIRONMENT }} \
            -Dsonar.projectName="AuraSkill API (${{ env.ENVIRONMENT }})"

      # Passo 2: Criar o secrets.env contendo apenas o segredo de direito do Backend
      - name: Create Temporary Secrets File in Infra Directory
        run: |
          echo "APP_DB_PASSWORD=${{ secrets.APP_DB_PASSWORD }}" > "${{ env.INFRA_ENV_DIR }}/secrets.env"

      # Passo 3: Build e Restart do container da API
      - name: Build and Restart API Container
        run: |
          export AURA_API_PATH="${{ github.workspace }}"
          
          docker compose \
            --env-file "${{ env.INFRA_ENV_DIR }}/.env" \
            --env-file "${{ env.INFRA_ENV_DIR }}/secrets.env" \
            -f "${{ env.INFRA_COMMON_DIR }}/docker-compose.base.yml" \
            -f "${{ env.INFRA_ENV_DIR }}/docker-compose.yml" \
            up -d --build --force-recreate --no-deps auraskill-api

      # Passo 4: Limpeza do arquivo secrets temporário por segurança
      - name: Clean up temporary secrets
        if: always()
        run: |
          rm -f "${{ env.INFRA_ENV_DIR }}/secrets.env"

      # Passo 5: Limpeza de imagens órfãs e cache de build para manter o disco saudável
      - name: Clean up old images
        run: |
          docker image prune -f
          docker builder prune -f