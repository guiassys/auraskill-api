name: Backend Deploy

on:
  push:
    branches:
      - hml
      - prd
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (dev, hml, prd)'
        required: true
        default: 'hml'
        type: choice
        options:
          - dev
          - hml
          - prd

jobs:
  deploy:
    name: Build and Deploy API
    runs-on: self-hosted

    steps:
      # Passo 0: Determinar o ambiente dinamicamente (dev, hml, prd)
      - name: Determine Environment
        id: set_environment
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ENVIRONMENT=${{ github.event.inputs.environment }}" >> "$GITHUB_ENV"
          else
            case "${{ github.ref_name }}" in
              "hml")
                echo "ENVIRONMENT=hml" >> "$GITHUB_ENV"
                ;;
              "prd")
                echo "ENVIRONMENT=prd" >> "$GITHUB_ENV"
                ;;
              *)
                echo "ENVIRONMENT=hml" >> "$GITHUB_ENV"
                ;;
            esac
          fi

      # Passo 1: Baixa o código fonte da branch que disparou o evento (hml ou prd)
      - name: Checkout API Code
        uses: actions/checkout@v4

      # Configurar o ambiente Java 21 com cache do Maven ativo
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # Executar Testes Automatizados via Maven
      - name: Run Automated Tests
        run: mvn clean test

      # Descobrir a porta/IP do Sonar do ambiente e executar a Análise de Código Estático
      - name: Run SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          # Caminho da Infra para ler o arquivo .env correto
          INFRA_ENV_DIR="/home/guiassys/actions-runner/_work/aura-infra/aura-infra/docker/${{ env.ENVIRONMENT }}"
          
          # Extrai os valores do respectivo arquivo .env de forma dinâmica
          SONAR_PORT=$(grep -E '^SONAR_PORT=' "$INFRA_ENV_DIR/.env" | cut -d'=' -f2)
          SONAR_HOST_IP=$(grep -E '^AURASKILL_HOST_IP=' "$INFRA_ENV_DIR/.env" | cut -d'=' -f2)
          
          echo "Enviando análise para o SonarQube em http://$SONAR_HOST_IP:$SONAR_PORT"
          
          # Executa o plugin do Sonar para Maven
          mvn sonar:sonar \
            -Dsonar.host.url=http://$SONAR_HOST_IP:$SONAR_PORT \
            -Dsonar.token=$SONAR_TOKEN \
            -Dsonar.projectKey=auraskill-api-${{ env.ENVIRONMENT }} \
            -Dsonar.projectName="AuraSkill API (${{ env.ENVIRONMENT }})"

      # Passo 2: Criar o secrets.env contendo apenas o segredo de direito do Backend
      - name: Create Temporary Secrets File in Infra Directory
        run: |
          INFRA_ENV_DIR="/home/guiassys/actions-runner/_work/aura-infra/aura-infra/docker/${{ env.ENVIRONMENT }}"
          
          # Injeta secrets
          echo "APP_DB_PASSWORD=${{ secrets.APP_DB_PASSWORD }}" > $INFRA_ENV_DIR/secrets.env

      # Passo 3: Build e Restart do container da API
      # O export garante que o Docker Compose use o código recém-baixado do backend como contexto de build
      - name: Build and Restart API Container
        run: |
          export AURA_API_PATH="${{ github.workspace }}"
          
          # Caminho exato do workspace da infraestrutura no runner self-hosted
          INFRA_ENV_DIR="/home/guiassys/actions-runner/_work/aura-infra/aura-infra/docker/${{ env.ENVIRONMENT }}"
          INFRA_COMMON_DIR="/home/guiassys/actions-runner/_work/aura-infra/aura-infra/docker/common"

          # Adicionado o arquivo base (-f) para o Docker Compose encontrar a definição do auraskill-api
          docker compose \
            --env-file $INFRA_ENV_DIR/.env \
            --env-file $INFRA_ENV_DIR/secrets.env \
            -f $INFRA_COMMON_DIR/docker-compose.base.yml \
            -f $INFRA_ENV_DIR/docker-compose.yml \
            up -d --build --force-recreate --no-deps auraskill-api

      # Passo 4: Limpeza do arquivo secrets temporário por segurança
      - name: Clean up temporary secrets
        if: always()
        run: |
          rm -f /home/guiassys/actions-runner/_work/aura-infra/aura-infra/docker/${{ env.ENVIRONMENT }}/secrets.env

      # Passo 5: Limpeza de imagens órfãs e cache de build para manter o disco saudável
      - name: Clean up old images
        run: |
          docker image prune -f
          docker builder prune -f